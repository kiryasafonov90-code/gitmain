name: Python Tests with Pytest

# Триггеры: запускать при пуше или пул-реквесте в ветку main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    # Запускаем на последней версии Ubuntu
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Проверка кода из репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Установка Python версии 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Шаг 3: Установка зависимостей (библиотек)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      # Шаг 4: Запуск тестов с помощью pytest
      - name: Run tests with Pytest
        run: |
          pytest -v
